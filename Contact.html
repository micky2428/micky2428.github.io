<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <link href="contact_styles.css" rel="stylesheet">
        <title>Contact</title>
        <script>
          //搭配javascrip，讓menu可以跟著跑
          var menu = document.getElementById('menu');
          var initialOffset = menu.offsetTop;

          window.addEventListener('scroll', function() {
            var scrollOffset = window.pageYOffset;
            menu.style.top = initialOffset + scrollOffset + 'px';
          });
        </script>
        <script>
        //跳出訊息
          document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('form').addEventListener('submit', function(e) {
              let name = document.querySelector('#Name').value;
              alert(`Hello, ${name}. I will get back to you soon.`);
              e.preventDefault();// 防止表單提交
            });
          });

       </script>
    </head>
    <body>
      <!-- Menu  -->
      <div id="menu">
        <header id="header" class="hoc clear">
          <div id="logo" class="fl_left">
            <a href="index.html">Yuan-Ting Liang(梁媛婷)</a>
          </div>
          <nav class="sticky-menu">
           <ul>
            <li class="active"><a href="index.html">Home</a></li>
            <li><a href="Profile.html">Profile</a></li>
            <li><a href="Portfolio.html">Portfolio</a></li>
            <li><a href="Contact.html">Contact</a></li>
            </ul>
          </nav>
        </header>
      </div>

      <!--Contact Section  -->
      <div id= ct>
            <h3><b>CONTACT ME</b></h3>
            <hr>
            <p>Please <a href="mailto:micky@gmail.com">email</a> me or leave me a message here.</p>
            <form>
              <div class="form-group">
                <input type="text" class="form-control" id="Name" placeholder="Your Name">
                <br>
              </div>
              <div class="form-group">
                <input type="email" class="form-control" id="Email" placeholder="Enter email">
                <br>
              </div>
              <div class="form-group">
                <input type="text" class="form-control" id="Subject" placeholder="Subject">
                <br>
              </div>
              <textarea class="form-control" rows="6" placeholder="Please leave the message here."></textarea>
                <br>
              <button type="submit" class="btn">SUBMIT</button>
            </form>
      </div>
      <!-- Footer-->
      <div id="copyright">
          <footer>Copyright &copy; 2023 - All Rights Reserved - Yuan-Ting Liang</footer>
      </div>
    </body>
</html>
